<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Master Mind</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Quicksand:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <style>
        body {
            background: radial-gradient(circle at top right, #1e1b4b, #0f172a);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            margin: 0;
            font-family: 'Poppins', sans-serif;
        }

        .login-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-text {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 2rem;
            color: #fff;
        }

        .logo-text span {
            color: #6366f1;
            text-shadow: 0 0 20px rgba(99, 102, 241, 0.5);
        }

        p {
            color: #94a3b8;
            margin-bottom: 2rem;
        }

        .btn-cta {
            background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
        }

        .btn-cta:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .supabase-badge {
            margin-top: 2rem;
            font-size: 0.75rem;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .bg-blobs {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            background: #6366f1;
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.2;
        }
    </style>
</head>

<body>
    <div class="bg-blobs">
        <div class="blob" style="width: 400px; height: 400px; top: -100px; left: -100px;"></div>
        <div class="blob" style="width: 300px; height: 300px; bottom: -50px; right: -50px; background: #8b5cf6;"></div>
    </div>

    <div class="login-card">
        <h1 class="logo-text">MASTER<span>MIND</span></h1>
        <p>Your ultimate cognitive challenge awaits. Please log in to continue.</p>

        <div id="login-container">
            <!-- Supabase Auth UI or simple redirect logic would go here -->
            <button class="btn-cta" id="supabase-login">Connect with Supabase</button>
        </div>

        <div class="supabase-badge">
            <img src="https://supabase.com/favicons/favicon-32x32.png" width="16" alt="Supabase">
            Powered by Supabase Auth
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        const supabase = createClient(
            "https://ibpakzvcjlptczjbsrlx.supabase.co",
            "sb_publishable_PLQXjQdvV_xMashWTv4lLw_SDEQWYnn"
        )

        // Check if already logged in and redirect to app
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = 'index.html';
            }
        }
        checkSession();

        // Handle Supabase Login (using Google OAuth)
        document.getElementById('supabase-login').addEventListener('click', async () => {
            try {
                const { error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.origin + window.location.pathname.replace('login.html', 'index.html')
                    }
                });
                if (error) throw error;
            } catch (error) {
                console.error('Login Error:', error.message);
                alert('Login failed: ' + error.message);
            }
        });

        gsap.from('.login-card', { opacity: 0, y: 30, duration: 1, ease: 'power3.out' });
    </script>
</body>

</html>
